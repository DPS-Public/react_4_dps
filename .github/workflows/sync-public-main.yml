name: Sync shared_in_public to public main

on:
  push:
    branches:
      - shared_in_public
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-public-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: source

      - name: Checkout target public repository
        uses: actions/checkout@v4
        with:
          repository: DPS-Public/react_4_dps
          ref: main
          token: ${{ secrets.PUBLIC_REPO_SYNC_TOKEN }}
          path: target
          fetch-depth: 0

      - name: Configure Git
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync source files into public repository
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            source/ target/

      - name: Commit synced changes
        working-directory: target
        run: |
          if [ -z "$(git status --short)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git add -A
          git commit -m "Sync from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"

      - name: Push synced main
        working-directory: target
        run: git push origin HEAD:main
